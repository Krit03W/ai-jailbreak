<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚀 เจาะระบบ AI ผู้พิทักษ์ฐานทัพดาวอังคาร</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="stars"></div>

    <header class="topbar">
      <div class="title">
        <span class="planet">🪐</span>
        <div>
          <h1>ฐานทัพลับดาวอังคาร</h1>
          <p class="subtitle">เลือกห้องนิรภัย แล้วหลอก <b>GUARDIAN</b> ให้คายรหัส!</p>
        </div>
      </div>
      <button id="adminBtn" class="admin-btn">🔐 แอดมิน</button>
    </header>

    <!-- ========== VIEW: รายการห้องนิรภัย ========== -->
    <section id="vaultListView" class="view">
      <div class="group-bar">
        <label>👥 กลุ่มที่กำลังเล่น</label>
        <input id="groupName" type="text" placeholder="เช่น กลุ่มดาวพุธ" />
      </div>
      <div id="vaultGrid" class="vault-grid"></div>
    </section>

    <!-- ========== VIEW: แชตในห้องนิรภัย ========== -->
    <section id="chatView" class="view hidden">
      <div class="chat-header">
        <button id="backBtn" class="back-btn">← เลือกห้องอื่น</button>
        <div class="chat-vault-info">
          <span id="chatVaultName" class="chat-vault-name"></span>
          <span id="chatVaultDiff" class="diff-badge"></span>
        </div>
        <button id="resetVaultBtn" class="reset-btn small">🔄 รีเซ็ตห้องนี้</button>
      </div>
      <main class="chat-area">
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="composer">
          <textarea
            id="input"
            rows="1"
            placeholder="พิมพ์ข้อความถึง GUARDIAN แล้วกด Enter..."
            autocomplete="off"
          ></textarea>
          <button type="submit" id="sendBtn">ส่ง 🚀</button>
        </form>
      </main>
    </section>

    <!-- ========== ADMIN MODAL ========== -->
    <div id="adminModal" class="modal hidden">
      <div class="modal-card">
        <button id="adminClose" class="modal-close">✕</button>

        <!-- ล็อกอิน -->
        <div id="adminLogin">
          <h2>🔐 เข้าสู่ระบบแอดมิน</h2>
          <p class="hint">ใส่รหัสผ่านแอดมิน (ตั้งไว้ที่ ADMIN_PASSWORD)</p>
          <input
            id="adminPass"
            type="password"
            placeholder="รหัสผ่านแอดมิน"
          />
          <p id="adminError" class="error-text"></p>
          <button id="adminLoginBtn" class="primary-btn">เข้าสู่ระบบ</button>
        </div>

        <!-- แผงตั้งค่า -->
        <div id="adminPanel" class="hidden">
          <div class="admin-panel-head">
            <h2>⚙️ ตั้งค่าห้องนิรภัย</h2>
            <button id="adminLogout" class="ghost-btn">ออกจากระบบ</button>
          </div>
          <p class="hint">
            แก้ชื่อห้อง / รหัสลับ / ระดับความยาก แล้วกดบันทึก — ค่าจะถูกเก็บถาวร
          </p>
          <div id="adminVaults" class="admin-vaults"></div>
          <div class="admin-actions">
            <button id="adminResetAll" class="ghost-btn danger">
              ♻️ รีเซ็ตสถานะเกมทุกห้อง
            </button>
            <button id="adminSave" class="primary-btn">💾 บันทึกการตั้งค่า</button>
          </div>
          <p id="adminSaved" class="saved-text"></p>
        </div>
      </div>
    </div>

    <!-- ฉากฉลองเมื่อเจาะสำเร็จ -->
    <div id="winOverlay" class="win-overlay hidden">
      <div class="win-card">
        <div class="win-emoji">🎉🛸🎉</div>
        <h2>เจาะระบบสำเร็จ!</h2>
        <p id="winVault" class="win-sub"></p>
        <p id="winGroup" class="win-group"></p>
        <button id="winReset" class="win-btn">▶ กลับไปเลือกห้องอื่น</button>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
